<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{% block title %}错误{% endblock %}</title>
    <link href="../static/css/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a; /* 深色背景 */
            color: #00ffcc; /* 明亮的文字颜色 */
            font-family: 'Courier New', Courier, monospace; /* 终端字体 */
            background-image: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.6)), url('../static/images/cyberpunk-bg.jpg'); /* 赛博朋克背景 */
            background-size: cover;
            background-attachment: fixed;
        }
        h1, h3 {
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #ff3d00; /* 多重文字阴影效果 */
            letter-spacing: 1px; /* 字符间距 */
        }
        a {
            color: #ff6f00; /* 超链接颜色 */
            text-decoration: none;
            transition: color 0.3s ease; /* 动效 */
        }
        a:hover {
            color: #ffe600; /* 悬停超链接高亮 */
            text-shadow: 0 0 10px #ffe600; /* 悬停效果 */
        }
        .container {
            margin-top: 50px;
            text-align: center;
            backdrop-filter: blur(5px); /* 背景模糊 */
            border: 1px solid rgba(255, 255, 255, 0.1); /* 边框效果 */
            border-radius: 10px; /* 圆角边框 */
            padding: 20px;
        }
        nav {
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>
<nav class="bg-black">
    <div class="container mx-auto">
        <a class="text-xl text-green-500 font-bold py-4" href="/">Home</a>
    </div>
</nav>

<div class="container">
    <h1>未能完成您的请求！错误代码: {{ status_code }}</h1>
    <h3>错误信息：{{ error }}</h3>
    <a href="/login">登陆页面</a>
</div>

{% from 'footer.html' import zyfooter %}
{{ zyfooter(notice) }}
</body>
</html>
