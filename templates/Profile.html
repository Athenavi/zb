<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="zyBLOG|基于flask的博客程序">
    <meta name="keywords" content="zyBLOG, flask, 七棵树, 奇客舒, 博客">
    <meta name="robots" content="index, follow">
    <title>{{ title }} | zyBLOG</title>
    <!-- Tailwind CSS -->
    <link href="/static/css/tailwind.min.css" rel="stylesheet">
    <link href="/static/css/main.css" rel="stylesheet">
    <link href="/static/css/idcard.css" rel="stylesheet">
    <style>
        #myFooter {
            background: transparent;
        }
    </style>
</head>

<body class="bg-cover bg-center">
<div class="container mx-auto mt-8 px-4">
    <div class="flex justify-center">
        <div class="w-full md:w-8/12 bg-white rounded-lg shadow-lg p-6">
            {% if userStatus %}
                <div class="flex items-center mb-4">
                    <div class="id-card">
                        <div class="imgBx">
                            <img src="{{ avatar_url }}">
                        </div>
                        <div class="id-content">
                            <div class="id-details">
                                <h2>{{ username }}<br><span>{{ userBio }}</span></h2>
                                <div class="id-data">
                                    <h3>{% if Articles %}
                                        {{ Articles|length }}
                                    {% else %}
                                        0
                                    {% endif %}<br><span>Posts</span></h3>
                                    <h3>{{ follower }}<br><span>Followers</span></h3>
                                    <h3>{{ following }}<br><span>Following</span></h3>
                                </div>
                                <div class="id-actionBtn">
                                    <button onclick="followed()" id="follow-btn">Follow</button>
                                    <button>Message</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <a href="/" class="ml-4 text-blue-700">Home</a>
                    <a href="/media" class="ml-4 text-blue-700">📂 媒体</a>
                    <a href="/setting/profiles" class="ml-4 text-blue-700">⚙️ 设置</a>
                </div>
                <div id="notifications" class="mb-6"></div>

                <script>
                    $(document).ready(function () {
                        var socket = io('{{ notiHost }}');
                        socket.on('new_notification', function (data) {
                            $('#notifications').append('<p class="text-red-600 mb-4">' + data.message + '</p>');
                        });
                    });
                </script>
            {% else %}
                <a href="/login?callback=profile" class="text-blue-700">需要登录</a>
            {% endif %}
            <hr class="my-4">
            <div class="space-y-4">
                {% for article in Articles %}
                    <div class="bg-gray-100 p-4 rounded-lg flex justify-between items-center">
                        <a href="{{ url_for('blog_detail', article=article) }}"
                           class="text-xl font-semibold text-blue-700">{{ article }}</a>
                        <div class="menu_div">
                            <div class="flex items-center space-x-4">
                                <a href="/edit/{{ article }}" class="text-green-500">编辑</a>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
</body>
</html>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/3.1.3/socket.io.min.js"></script>
<script>
    window.onload = function () {
        setTimeout(function () {
            fetch('{{ notiHost }}', {
                method: 'GET',
                credentials: 'include'
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    console.log(data);
                })
                .catch(error => {
                    console.error('There has been a problem with your fetch operation:', error);
                });
        }, 3000);
    };
</script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const parentContainer = document.getElementById('notice'); // 这里假设有个notice容器

        parentContainer.addEventListener('click', function (event) {
            if (event.target && event.target.classList.contains('notice_read')) {
                if (confirm('是否删除此通知？')) {
                    const nid = event.target.id;

                    fetch('{{ notiHost }}/read?nid=' + nid, {
                        method: 'GET',
                        credentials: 'include'
                    })
                        .then(response => response.json())
                        .then(data => {
                            if (data.is_notice_read) {
                                event.target.parentElement.removeChild(event.target);
                            } else {
                                alert('删除失败，请稍后再试。');
                            }
                        })
                        .catch(error => {
                            console.error('发生错误:', error);
                            alert('请求发生错误，请重试。');
                        });
                }
            }
        });
    });
</script>
<script>
    function followed() {
        var fid = getParameterByName('id');
        if (!fid) {
            alert('不能关注自己或无效的关注ID！！！');
            hiddenFollow(1)
            return; // 直接返回
        }
        fetch(`/api/follow?fid=${fid}`, {
            method: 'POST',
            credentials: 'include'
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error('网络响应不正确');
                }
                return response.json();
            })
            .then(data => {
                if (data.follow_code === 'success') {
                    alert('成功关注');
                    hiddenFollow(1);
                    return 0;
                } else {
                    alert('关注失败！！: ' + data.message);
                }
            })
            .catch(error => alert('关注失败！！: ' + error));
    }

    function unfollowed() {
        var fid = getParameterByName('id');
        if (!fid) {
            alert('不能取消关注自己或无效的关注ID！！！');
            hiddenFollow(2)
            return; // 直接返回
        }
        fetch(`/api/unfollow?fid=${fid}`, {
            method: 'POST',
            credentials: 'include'
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error('网络响应不正确');
                }
                return response.json();
            })
            .then(data => {
                if (data.follow_code === 'success') {
                    alert('成功取消关注');
                    hiddenFollow(2);
                    return 0;
                } else {
                    alert(data.message);
                }
            })
            .catch(error => alert('取消关注失败！！: ' + error));
    }

    function hiddenFollow(type) {
        var followBtn = document.getElementById('follow-btn');
        var unfollowBtn = document.getElementById('unfollow-btn');

        if (type === 1) {
            if (followBtn) {
                followBtn.style.display = 'none';
            }
            // 在id-actionBtn中插入取消关注按钮
            if (!unfollowBtn) {
                var idh2 = document.getElementById('id-actionBtn');
                idh2.innerHTML += '<button onclick="unfollowed()" id="unfollow-btn">取消关注</button>';
            }
        }
        if (type === 2) {
            if (unfollowBtn) {
                unfollowBtn.style.display = 'none';
            }
        }
    }

    function getParameterByName(name) {
        name = name.replace(/[\[\]]/g, "\\$&");
        var url = window.location.href;
        var regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)");
        var results = regex.exec(url);
        if (!results) return null;
        if (!results[2]) return '';
        return decodeURIComponent(results[2].replace(/\+/g, " "));
    }

    {#window.onload = function () {
        var menuDivs = document.getElementsByClassName('menu_div');
        for (var i = 0; i < menuDivs.length; i++) {
            menuDivs[i].style.display = 'none';
        }
    }#}
</script>
