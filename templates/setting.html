<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>用户个人资料设置</title>
    <style>
        body {
            background-color: #f8f9fa;
        }

        .container {
            margin-top: 30px;
            display: flex;
        }

        .menu {
            width: 250px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .menu a {
            display: block;
            padding: 10px;
            color: #333;
            text-decoration: none;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .menu a:hover {
            background-color: #e9ecef;
        }

        .content {
            flex: 1;
            margin-left: 20px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-bottom: 20px;
        }

        .iframe-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 aspect ratio */
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 8px;
        }
    </style>
</head>
<body class="{{ theme }}">
<div class="container">
    <div class="menu">
        <h5><a href="/profile">↩️</a></h5><br>
        <h4>设置</h4>
        <a href="#" onclick="showSection('profile')">个人资料</a>
        <a href="#" onclick="showSection('newArticle')">上传文章</a>
        <a href="#" onclick="showSection('personalization')">个性化</a>
        <a href="#" onclick="showSection('privacy')">隐私</a>
        <a href="#" onclick="showSection('change-pass')">修改密码</a>
        <a onclick="fun_logout()">注销</a>　
    </div>

    <div class="content">
        <div id="profile" class="section">
            <h2>个人资料</h2>
            <img src="{{ avatar_url }}" style="height: 105px;border-radius: 50%" alt=""
                 ondblclick="avatarInfo()"/>
            <form>
                <div class="mb-3">
                    <label for="username" class="form-label"></label>
                    <input type="text" class="form-control" id="username" placeholder="{{ username }}" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label"></label>
                    <input type="email" class="form-control" id="email" placeholder="电子邮件" required>
                </div>
                <div class="mb-3">
                    <label for="bio" class="form-label"></label>
                    <textarea class="form-control" id="bio" rows="3" placeholder="个人简介"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">保存更改</button>
            </form>
        </div>
        <div id="newArticle" class="section" style="display: none;">
            <h2>上传文章</h2>
            <div class="iframe-container">
                <iframe src="/newArticle" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
        <div id="personalization" class="section" style="display: none;">
            <h2>个性化设置</h2>
            <p>在这里进行您的个性化偏好设置。</p>
            <!-- 个性化设置内容 -->
        </div>
        <div id="privacy" class="section" style="display: none;">
            <h2>隐私设置</h2>
            <p>在这里管理您的隐私设置。</p>
            <!-- 隐私设置内容 -->
        </div>
        <div id="change-pass" class="section" style="display: none;">
            <h2>密码设置</h2>
            <p>在这里修改您的密码设置。</p>
            <div class="iframe-container">
                <iframe src="/change-password" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
<script>
    function avatarInfo() {
        alert('如何修改我的头像？ \n上传名字为avatar.png到媒体文件中')
    }

    function fun_logout() {
        const confirmed = confirm("确定要注销吗？");
        // 如果确认，则跳转到指定的 URL
        if (confirmed) {
            window.location.href = "/logout";
        }
    }


    function showSection(section) {
        // 隐藏所有部分
        document.querySelectorAll('.section').forEach(function (el) {
            el.style.display = 'none';
        });
        // 显示选定部分
        document.getElementById(section).style.display = 'block';
    }
</script>
</body>
</html>
