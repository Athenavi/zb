<body>
<div id="app">🏃‍🏃‍🏃‍💨加载中...</div>
<div id='comments_zone' style="display: none;background-color: #6679cc;width:380px">
    与本文有关的标签{% for Tag in article_tags %}<a href="/?tag={{ Tag }}">{{ Tag }}</a>{% endfor %}
    /<<--点击标签获取更多文章|/本文作者：<a href="/profile?id={{ author }}" target="_blank">{{ author }}</a>
    <div id="tcomment"></div>
    <script src="https://cdn.jsdelivr.net/npm/twikoo@1.6.39/dist/twikoo.all.min.js"></script>
    <script>
        twikoo.init({
            envId: 'http://twikoo.7trees.cn/',
            el: '#tcomment'
        })
    </script>
    <button id="hide_comments" onclick="hideComments()" style="display: none;">隐藏评论区</button>
</div>


<script>
    function showComments() {
        document.getElementById('comments_zone').style.display = 'block';
        document.getElementById('show_comments').style.display = 'none';
        document.getElementById('hide_comments').style.display = 'block';
        document.body.scrollTop = 0;
        document.documentElement.scrollTop = 0;
        var element = document.getElementById('comments_zone');
        element.scrollIntoView({behavior: 'smooth'});
    }

    function hideComments() {
        document.getElementById('comments_zone').style.display = 'none';
        document.getElementById('show_comments').style.display = 'block';
        document.getElementById('hide_comments').style.display = 'none';
    }
</script>

<script language=javascript>
    function siteTime() {
        window.setTimeout("siteTime()", 1000);
        var seconds = 1000;
        var minutes = seconds * 60;
        var hours = minutes * 60;
        var days = hours * 24;
        var years = days * 365;
        var today = new Date();
        var todayYear = today.getFullYear();
        var todayMonth = today.getMonth() + 1;
        var todayDate = today.getDate();
        var todayHour = today.getHours();
        var todayMinute = today.getMinutes();
        var todaySecond = today.getSeconds();
        /* 建站时间 */
        var t1 = Date.UTC(2022, 10, 15, 12, 10, 10);
        var t2 = Date.UTC(todayYear, todayMonth, todayDate, todayHour, todayMinute, todaySecond);
        var diff = t2 - t1;
        var diffYears = Math.floor(diff / years);
        var diffDays = Math.floor((diff / days) - diffYears * 365);
        var diffHours = Math.floor((diff - (diffYears * 365 + diffDays) * days) / hours);
        var diffMinutes = Math.floor((diff - (diffYears * 365 + diffDays) * days - diffHours * hours) / minutes);
        var diffSeconds = Math.floor((diff - (diffYears * 365 + diffDays) * days - diffHours * hours - diffMinutes * minutes) / seconds);
        document.getElementById("sitetime").innerHTML = " 已安全运行 " + diffYears + " 年 " + diffDays + " 天 " + diffHours + " 小时 " + diffMinutes + " 分 " + diffSeconds + " 秒 ";
    }

    siteTime();
</script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        // 从本地存储中读取主题状态
        const currentTheme = localStorage.getItem('theme');
        let isDark;

        // 如果没有存储的主题状态，默认设置为白天模式
        if (!currentTheme) {
            isDark = false; // 默认为光明模式
            localStorage.setItem('theme', 'light');
        } else {
            isDark = currentTheme === 'dark'; // 根据本地存储设置主题状态
        }

        // 根据主题状态加载对应的 CSS
        function loadCSS() {
            const linkElement = document.createElement('link');
            linkElement.rel = 'stylesheet';
            linkElement.href = isDark ? '../static/css/dark.css' : '../static/css/vue.css';
            document.head.appendChild(linkElement);
        }

        // 初始加载 CSS
        loadCSS();
    });
</script>
