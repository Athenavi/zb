<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
    <title>后台管理页面</title>
    <style>
        body.light {
            background-color: #f7fafc;
            color: #1a202c;
            font-family: Arial, sans-serif;
        }

        body.dark {
            background-color: #1a202c;
            color: white;
            font-family: Arial, sans-serif;
        }

        /* Table Styles for Light Mode */
        .table-light {
            background-color: #ffffff;
            color: #1a202c;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .table-light tr:hover {
            background-color: #ebf8ff;
            transform: scale(1.02);
        }

        /* Table Styles for Dark Mode */
        .table-dark {
            background-color: #2d3748;
            color: white;
            border: 1px solid #4a5568;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .table-dark tr:hover {
            background-color: #4a5568;
            transform: scale(1.02);
        }

        thead {
            background-color: #edf2f7;
            font-weight: bold;
        }

        body.dark thead {
            background-color: #4a5568;
            font-weight: bold;
        }

        td {
            position: relative;
            cursor: pointer;
        }

        td::after {
            content: attr(data-tooltip); /* 使用 data-tooltip 的值 */
            position: absolute;
            bottom: 100%; /* 在上方显示 */
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 5px;
            border-radius: 5px;
            white-space: nowrap;
            visibility: hidden; /* 初始为不可见 */
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10; /* 确保提示在其他元素之上 */
        }

        td:hover::after {
            visibility: visible; /* 悬浮时可见 */
            opacity: 1;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px; /* 垂直滚动条的宽度 */
            height: 8px; /* 水平滚动条的高度 */
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(0, 0, 0, 0.2); /* 滚动条的颜色 */
            border-radius: 10px; /* 滚动条的圆角 */
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent; /* 滚动条轨道的背景 */
        }

        /* 如果需要兼容 Firefox */
        .custom-scrollbar {
            scrollbar-width: thin; /* 在 Firefox 中设置为细的滚动条 */
            scrollbar-color: rgba(0, 0, 0, 0.2) transparent; /* 滚动条颜色 */
        }
    </style>
</head>
<body id="body" class="light">
<div class="flex">
    <aside class="w-full md:w-64 bg-gradient-to-r from-blue-600 to-blue-400 shadow-lg md:h-screen">
        <div class="p-6">
            <h2 class="text-3xl text-white font-bold">管理面板</h2>
        </div>
        <nav>
            <ul>
                <li class="hover:bg-blue-300">
                    <a href="{{ url_for('m_overview') }}"
                       class="text-white block py-4 px-6 transition duration-300">仪表盘</a>
                </li>
                <li class="hover:bg-blue-300">
                    <a href="{{ url_for('m_articles') }}"
                       class="text-white block py-4 px-6 transition duration-300">文章管理</a>
                </li>
                <li class="hover:bg-blue-300">
                    <a href="{{ url_for('m_users') }}"
                       class="text-white block py-4 px-6 transition duration-300">用户管理</a>
                </li>
                <li class="hover:bg-blue-300">
                    <a href="{{ url_for('m_comments') }}"
                       class="text-white block py-4 px-6 transition duration-300">评论管理</a>
                </li>
                <li class="hover:bg-blue-300">
                    <a href="{{ url_for('m_media') }}"
                       class="text-white block py-4 px-6 transition duration-300">媒体管理</a>
                </li>
                <li class="hover:bg-blue-300">
                    <a href="{{ url_for('m_notifications') }}" class="text-white block py-4 px-6 transition duration-300">通知管理</a>
                </li>
                <li class="hover:bg-blue-300">
                    <a href="{{ url_for('m_reports') }}"
                       class="text-white block py-4 px-6 transition duration-300">举报管理</a>
                </li>
                <li class="hover:bg-blue-300">
                    <a href="{{ url_for('m_urls') }}"
                       class="text-white block py-4 px-6 transition duration-300">链接管理</a>
                </li>
                <li class="hover:bg-blue-300">
                    <a href="{{ url_for('m_display') }}"
                       class="text-white block py-4 px-6 transition duration-300">主题与外观 </a>
                    <button id="theme-toggle" class="text-xl">
                        <i id="toggle-icon" class="fas fa-sun"></i>
                    </button>
                </li>
            </ul>
        </nav>
    </aside>
    <main class="flex-1 p-6">
        {% block content %}{% endblock %}
    </main>
</div>
</body>
</html>
<script>
    window.onload = function () {
        const toggleButton = document.getElementById('theme-toggle');
        const toggleIcon = document.getElementById('toggle-icon');
        const body = document.getElementById('body');

        // 获取存储的主题
        const currentTheme = localStorage.getItem('theme');
        let theme = currentTheme ? currentTheme : 'light';

        // 设置初始主题
        body.classList.add(theme);
        toggleIcon.className = theme === 'light' ? 'fas fa-sun' : 'fas fa-moon';

        toggleButton.addEventListener('click', () => {
            if (theme === 'light') {
                body.classList.replace('light', 'dark');
                toggleIcon.classList.replace('fa-sun', 'fa-moon');
                theme = 'dark';
            } else {
                body.classList.replace('dark', 'light');
                toggleIcon.classList.replace('fa-moon', 'fa-sun');
                theme = 'light';
            }
            // 保存主题到本地存储
            localStorage.setItem('theme', theme);
        });
        document.querySelectorAll('td').forEach(td => {
            td.setAttribute('data-tooltip', td.textContent);
        });
    }

    // Toggle sidebar visibility on mobile
    toggleSidebarButton.addEventListener('click', () => {
        sidebar.classList.toggle('-translate-x-full');
    });
</script>
