<!DOCTYPE html>
<!-- 网站主语言 -->
<html lang="zh-cn">

<head>
    <!-- 网站采用的字符编码 -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- 预留网站标题的位置 -->
    <title>{% block title %}{% endblock %}</title>
    <!-- 引入Tailwind CSS的样式文件 -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            background: url(../static/image/day.jpg) no-repeat center/cover;
        }
    </style>
</head>

<body>
<!-- 导航栏 -->
<nav class="bg-primary">
    <div class="container mx-auto">
        <a class="text-white text-xl font-bold" href="#">奇客舒</a>
        <ul class="flex">
            <li class="mr-6">
                <a class="text-white" href="/">返回</a>
            </li>
        </ul>
    </div>
</nav>

<!-- 页面内容 -->
<div class="container mx-auto">
    <div class="flex justify-center">
        <div class="w-1/2">
            <br>
            {% if form =='confirm' %}
                <form method="post" action="/confirm-password">
                    <div class="mb-4">
                        <label for="password"
                               class="block text-gray-700 text-sm font-bold mb-2">你需要输入当前密码来确认身份</label>
                        <input type="password"
                               class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                               id="password" name="password" required>
                    </div>
                    <button type="submit"
                            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
                            type="button">
                        我已确认
                    </button>
                </form>
            {% endif %}

            {% if form =='change' %}
                <form id="changePasswordForm" action="/change-password" method="POST">
                    <h1>修改密码</h1>
                    <div class="mb-4">
                        <label for="username" class="block text-gray-700 text-sm font-bold mb-2">确认账号</label>
                        <input type="text"
                               class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                               id="username" name="username" required>
                    </div>
                    <div class="mb-4">
                        <label for="new_password" class="block text-gray-700 text-sm font-bold mb-2">新密码</label>
                        <input type="password"
                               class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                               id="new_password" name="new_password" required>
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password"
                               class="block text-gray-700 text-sm font-bold mb-2">再次确认新密码</label>
                        <input type="password"
                               class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                               id="confirm_password" name="confirm_password" required>
                    </div>
                    <button type="submit"
                            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
                            type="button">
                        提交修改
                    </button>
                </form>
            {% endif %}

        </div>
    </div>
</div>

<!-- 页面底部 -->
<footer class="py-3 bg-dark fixed-bottom">
    <div class="container">
        <p class="m-0 text-center text-white">版权所有 &copy;zyBLOG 2024</p>
    </div>
</footer>
</body>

</html>
