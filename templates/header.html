{% macro zytopbar() -%}
    <link href="../static/css/tailwind.min.css" rel="stylesheet">
    <style>
        #loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            font-size: 24px;
            text-align: center;
            line-height: 100vh;
        }

        .fixed-icon {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 35px;
            z-index: 999999;
        }

        .image-button {
            cursor: pointer;
        }

        /* 二级菜单样式 */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: white;
            min-width: 160px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }

        .dropdown-content a:hover {
            background-color: #f1f1f1;
        }
    </style>

    <div id="loading">Loading...</div>

    <nav class="bg-blue-500">
        <div class="container mx-auto flex justify-between items-center">
            <a class="text-xl text-white font-bold py-4" href="/"><img src="../static/favicon.ico"
                                                                       style="height: 32px"/></a>
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex space-x-4">
                    <div class="dropdown">
                        <button class="text-white hover:bg-blue-600 px-4 py-2"><a href="/">主页</a></button>
                    </div>
                    <div class="dropdown">
                        <button class="text-white hover:bg-blue-600 px-4 py-2">🔻文章探索</button>
                        <div class="dropdown-content">
                            <a href="/travel">随机文章</a>
                            <a href="/rss">rss</a>
                            <a href="/sitemap">站点地图</a>
                        </div>
                    </div>
                    <div class="dropdown">
                        <button class="text-white hover:bg-blue-600 px-4 py-2">🔻关于本站</button>
                        <div class="dropdown-content">
                            <a href="/blog/README">readme</a>
                            <a href="/blog/legal-agreement">隐私协议</a>
                            <a href="/donate">打赏捐赠</a>
                            <a href="mailto:support@7trees.cn" target="_blank">📧邮件联系</a>
                            <a href="https://github.com/Athenavi/zb/issues" target="_blank">💬issue提交</a>
                        </div>
                    </div>
                    <div class="dropdown">
                        <button class="text-white hover:bg-blue-600 px-4 py-2"><a href="/links">友链</a></button>
                    </div>
                </div>
            </div>
            <div class="flex items-center">
                <a href="/profile" class="text-white">🤳</a>
                <button id="theme-toggle"
                        class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 focus:outline-none">
                    🌙
                </button>
                <a href="../search" target="_blank" class="text-white">🔍</a>
            </div>
        </div>
    </nav>

    <div class="fixed-icon">
        <script>
            function scrollToTop() {
                document.body.scrollTop = 0;
                document.documentElement.scrollTop = 0;
            }
        </script>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.1/umd/popper.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById("loading").style.display = "none";
        });
        window.addEventListener('contextmenu', function (e) {
            e.preventDefault();
        }, false);
    </script>

    <div class="fixed bottom-4 right-4">
        <button class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600 focus:outline-none transition-transform duration-300 transform hover:scale-105 shadow-lg hover:shadow-xl"
                onclick="scrollToTop()">
            🔝
        </button>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const button = document.getElementById('theme-toggle');

            const currentTheme = localStorage.getItem('theme');
            let isDark = currentTheme === 'dark';

            document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
            button.textContent = isDark ? '☀' : '🌙';

            button.addEventListener('click', () => {
                isDark = !isDark;

                document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
                button.textContent = isDark ? '☀' : '🌙';

                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });
        });
    </script>
{% endmacro %}
