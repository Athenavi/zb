{% macro zytopbar() -%}
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="/static/css/tailwind.min.css" rel="stylesheet">
    <link href="/static/css/side.css" rel="stylesheet">

    <div id="loading">Loading...</div>
    <nav class="bg-blue-500">
        <div class="container mx-auto flex justify-between items-center p-4">
            <div class="flex items-center"><img src="../static/favicon.ico"
                                                style="height: 32px"/>
            </div>
            <div class="flex space-x-6">
                <a href="/" class="text-white hover:bg-purple-700 px-4 py-2 rounded">首页</a>
                <a href="/profile" class="text-white hover:bg-purple-700 px-4 py-2 rounded">我的</a>
                <a href="/guestbook" class="text-white hover:bg-purple-700 px-4 py-2 rounded">留言板</a>
                <div class="dropdown">
                    <button class="text-white hover:bg-blue-600 px-4 py-2">🔻资源</button>
                    <div class="dropdown-content">
                        <a href="/media">媒体</a>
                        <a href="/register">注册</a>
                        <a href="/links">友链</a>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="text-white hover:bg-blue-600 px-4 py-2">🔻关于</button>
                    <div class="dropdown-content">
                        <a href="/blog/README">readme</a>
                        <a href="/blog/legal-agreement">隐私协议</a>
                        <a href="/donate">打赏捐赠</a>
                        <a href="mailto:support@7trees.cn" target="_blank">📧邮件联系</a>
                        <a href="https://github.com/Athenavi/zb/issues" target="_blank">💬issue提交</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="fixed-icon">
        <script>
            function scrollToTop() {
                document.body.scrollTop = 0;
                document.documentElement.scrollTop = 0;
            }
        </script>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.1/umd/popper.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById("loading").style.display = "none";
        });
        window.addEventListener('contextmenu', function (e) {
            e.preventDefault();
        }, false);
    </script>

    <div class="fixed bottom-4 right-4">
        <button class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600 focus:outline-none transition-transform duration-300 transform hover:scale-105 shadow-lg hover:shadow-xl"
                onclick="scrollToTop()">
            🔝
        </button>
        <button id="theme-toggle"
                class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 focus:outline-none">
            🌙
        </button>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const button = document.getElementById('theme-toggle');

            const currentTheme = localStorage.getItem('theme');
            let isDark = currentTheme === 'dark';

            document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
            button.textContent = isDark ? '☀' : '🌙';

            button.addEventListener('click', () => {
                isDark = !isDark;

                document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
                button.textContent = isDark ? '☀' : '🌙';

                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });
        });
    </script>
    <style>.dropdown {
        position: relative;
        display: inline-block;
    }

    .dropdown-content {
        display: none;
        position: absolute;
        background-color: #ffffff;
        min-width: 160px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        z-index: 1;
        border-radius: 4px;
    }

    .dropdown-content a {
        color: #333;
        padding: 10px 12px;
        text-decoration: none;
        display: block;
    }

    .dropdown-content a:hover {
        background-color: #f1f1f1;
        color: #000;
    }

    .dropdown:hover .dropdown-content {
        display: block;
    }</style>
{% endmacro %}
